<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0b0f19;color:#d1d5db;min-height:100vh;padding-bottom:3rem}
button{cursor:pointer;font-family:inherit;border:none}textarea,input,select{font-family:inherit}

.header-bar{border-bottom:1px solid #1f2937;background:rgba(17,24,39,.5);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.main-grid{max-width:1280px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:1fr;gap:24px}

.card{background:rgba(17,24,39,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px}

.textarea{width:100%;background:rgba(10,14,23,.8);border:1px solid #1f2937;border-radius:10px;padding:10px;font-size:13px;color:#e5e7eb;resize:vertical;outline:none;line-height:1.6}

.badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:500;display:inline-flex;align-items:center;gap:4px}

.badge-red{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}

.progress-track{width:100%;height:4px;border-radius:4px;background:#1f2937;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}

.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-5{margin-bottom:20px}.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}

.overflow-x-auto{overflow-x:auto}.overflow-y-auto{overflow-y:auto}.whitespace-pre-wrap{white-space:pre-wrap}
.rounded-lg{border-radius:8px}.rounded-xl{border-radius:12px}.rounded-full{border-radius:999px}
.cursor-pointer{cursor:pointer}.transition{transition:all .2s}.block{display:block}.inline-block{display:inline-block}

.output-box{height:240px;overflow-y:auto;white-space:pre-wrap;font-family:'Cascadia Code','SF Mono','Consolas',monospace;font-size:12px;color:#9ca3af;background:rgba(10,14,23,.7);padding:12px;border-radius:10px;border:1px solid #111827;line-height:1.65}

.grid{display:grid}.grid-2{grid-template-columns:1fr 1fr}.grid-5{grid-template-columns:repeat(5,1fr)}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
.space-y-1>*+*{margin-top:4px}.space-y-2>*+*{margin-top:8px}.space-y-3>*+*{margin-top:12px}.space-y-4>*+*{margin-top:16px}.space-y-6>*+*{margin-top:24px}

function updateJudgeModel(){
  judgeModel=document.getElementById('judgeModelSelect').value;
  var opt=J.find(function(o){return o.id===judgeModel;});
  document.getElementById('standardsJudgeName').textContent=opt.name+' ('+opt.vendor+')';

  else{cf.classList.remove('hidden-real');cf.style.color='#22d3ee';cf.innerHTML='✅ 真正第三方裁判 — 不在5个待测模型中，评分公正客观。';}

// ── Pipeline ──
async function runBenchmark(){
  var basePrompt=document.getElementById('promptInput').value.trim();if(!basePrompt)return alert('请输入测试用例内容！');
  benchStartTime=new Date();S={};
  var ctr=document.getElementById('pipelineContainer');ctr.innerHTML='';
  // 首轮用当前输入，后续轮次从autoEx随机抽取不同情境
  var prompts=[];for(var r=0;r<runCount;r++){if(r===0)prompts.push(basePrompt);else{var pick;do{pick=autoEx[Math.floor(Math.random()*autoEx.length)];}while(pick===basePrompt&&autoEx.length>1);prompts.push(pick);}}
  M.forEach(function(m){S[m.tag]={runs:[],human:{},rawPrompt:basePrompt,bestRunIdx:0,done:false,allTimedOut:false};C.forEach(function(c){S[m.tag].human[c.key]=15;});ctr.innerHTML+=buildCard(m);});
  for(var r=0;r<runCount;r++){
    var roundPrompt=prompts[r];
    document.getElementById('promptInput').value=roundPrompt;
    M.forEach(function(m){updateStatus(m.tag,'['+(r+1)+'/'+runCount+'] 情境'+(r+1)+'...','amber');updateDot(m.tag,'amber',true);});
    var tasks=M.map(function(m){return runSingleRound(m,r,roundPrompt).then(function(){var x=findModelByTag(m.tag);if(x)refreshCard(x);});});
    await Promise.all(tasks);
  }
  document.getElementById('promptInput').value=basePrompt;
  M.forEach(function(m){var d=S[m.tag],dr=d.runs.filter(function(r){return r.done&&!r.timedOut;});d.allTimedOut=dr.length===0;if(!d.allTimedOut)updateBestRun(m.tag);d.done=true;});
  markAllDone();M.forEach(function(m){refreshCard(m);});
}

function findModelByTag(tag){for(var i=0;i<M.length;i++){if(M[i].tag===tag)return M[i];}return null;}

async function runSingleRound(model,round,prompt){
  var tag=model.tag;if(!S[tag].runs[round])S[tag].runs[round]={ai:{},plan:'',verdict:'',prompt:prompt,done:false,timedOut:false,elapsedMs:0};
  var run=S[tag].runs[round],t0=performance.now();
  updateStatus(tag,'['+(round+1)+'/'+runCount+'] 生成中...','amber');
  try{
    var g=await fetch(U,{method:'POST',headers:{'Authorization':'Bearer '+A,'Content-Type':'application/json'},body:JSON.stringify({model:model.id,messages:[{role:"user",content:prompt}],temperature:0.3,max_tokens:4096})});
    if(!g.ok){var et=await g.text().catch(function(){return'';});throw new Error('HTTP '+g.status+': '+et.slice(0,200));}
    var gd=await g.json();if(gd.error)throw new Error(gd.error.message);
    if(!gd.choices||!gd.choices[0])throw new Error('空响应');
    run.plan=gd.choices[0].message.content||gd.choices[0].message.reasoning_content||'';
    if(!run.plan)throw new Error('空内容');
    updateStatus(tag,'['+(round+1)+'/'+runCount+'] AI盲评中...','amber');

    var jb={model:judgeModel,messages:[{role:"system",content:'你是项目管理专家。对日程计划五维度盲评(每项0-20): 1.schedule 2.dependency 3.balance 4.constraint 5.executable。输出: {"scores":{"schedule":15,"dependency":16,"balance":14,"constraint":17,"executable":13},"total":75,"verdict":"短评"}'},{role:"user",content:'约束:\n'+prompt+'\n\n计划:\n'+run.plan}],temperature:0.1};
    if(judgeModel.indexOf('DeepSeek-V3')>=0)jb.response_format={type:"json_object"};
    var jr=await fetch(U,{method:'POST',headers:{'Authorization':'Bearer '+A,'Content-Type':'application/json'},body:JSON.stringify(jb)});
    var jd=await jr.json(),jm=jd.choices[0].message,raw=(jm.content||jm.reasoning_content||'').replace(/```json/g,'').replace(/```/g,'').trim();
    if(!raw)throw new Error('裁判空响应');
    var an=JSON.parse(raw);C.forEach(function(c){run.ai[c.key]=an.scores[c.key]||0;});
    run.verdict=an.verdict||'';run.done=true;run.elapsedMs=Math.round(performance.now()-t0);
    updateStatus(tag,'['+(round+1)+'/'+runCount+'] ✅ '+(run.elapsedMs/1000).toFixed(1)+'s','green');updateDot(tag,'green',false);
  }catch(e){run.elapsedMs=Math.round(performance.now()-t0);run.done=false;run.timedOut=false;run.plan='【API异常】\n模型: '+model.id+'\n错误: '+e.message;updateStatus(tag,'❌ 异常','red');updateDot(tag,'red',false);console.error(tag,e);}
}

function updateBestRun(tag){
  var runs=S[tag].runs.filter(function(r){return r.done&&!r.timedOut;});if(!runs.length)return;
  var bi=0,bs=-1;S[tag].runs.forEach(function(r,i){if(r.done&&!r.timedOut){var s=0;C.forEach(function(c){s+=r.ai[c.key]||0;});if(s>bs){bs=s;bi=i;}}});
  S[tag].bestRunIdx=bi;
}

function updateStatus(tag,text,type){var el=document.getElementById('status-'+tag);if(!el)return;el.innerText=text;var m={amber:'badge-amber',green:'badge-green',red:'badge-red'};el.className='badge '+(m[type]||'badge-amber');}
function updateDot(tag,color,pulse){var el=document.getElementById('dot-'+tag);if(el)el.className='dot dot-'+color+(pulse?' animate-pulse':'');}
function markAllDone(){M.forEach(function(m){var d=S[m.tag];if(d&&d.allTimedOut){updateStatus(m.tag,'⏱️ 淘汰','red');updateDot(m.tag,'red',false);}else{updateStatus(m.tag,'✅ 就绪','green');updateDot(m.tag,'green',false);}});}

function refreshCard(model){
  var tag=model.tag,m=S[tag];if(!m||!m.runs.length)return;
  // 显示最新完成轮次的输出（而非best），让人工打分能看到每轮新输出
  var lastDone=null;for(var ri=m.runs.length-1;ri>=0;ri--){if(m.runs[ri]&&m.runs[ri].done&&!m.runs[ri].timedOut){lastDone=m.runs[ri];break;}}
  if(!lastDone)lastDone=m.runs[m.bestRunIdx];
  var best=m.runs[m.bestRunIdx],outEl=document.getElementById('output-'+tag);
  if(outEl&&lastDone&&lastDone.plan){var roundLabel=lastDone===best?' (最佳)':' (最新轮次)';outEl.innerHTML='<div class="text-xs text-amber mb-1">📝 R'+(m.runs.indexOf(lastDone)+1)+roundLabel+'</div>'+escapeHtml(lastDone.plan);}
  else if(outEl&&m.allTimedOut)outEl.innerHTML='<span style="color:#f87171">⏱️ 所有轮次超时淘汰。</span>';
  var dr=m.runs.filter(function(r){return r.done&&!r.timedOut;}),panelAi=document.getElementById('panel-ai-'+tag),loadingEl=document.getElementById('score-loading-'+tag);
  if(loadingEl)loadingEl.classList.add('hidden-real');

function exportCSV(){
  var all=M.filter(function(m){return S[m.tag]&&S[m.tag].runs.length;});if(!all.length)return;
  var csv='模型,轮次,状态,'+C.map(function(c){return c.label;}).join(',')+',AI总分,耗时s,人工总分,最终得分\n';
  all.forEach(function(m){var d=S[m.tag];d.runs.forEach(function(r,i){if(r.timedOut)csv+=m.name+',R'+(i+1)+',超时,,,,,,'+(r.elapsedMs/1000).toFixed(1)+',,\n';else if(!r.done)csv+=m.name+',R'+(i+1)+',API异常,,,,,,\n';else{var sum=0;C.forEach(function(c){sum+=r.ai[c.key]||0;});csv+=m.name+',R'+(i+1)+',完成,'+C.map(function(c){return r.ai[c.key]||0;}).join(',')+','+sum+','+(r.elapsedMs/1000).toFixed(1)+',,\n';}});if(!d.allTimedOut){csv+=m.name+',聚合均值,'+C.map(function(c){var dr=d.runs.filter(function(r){return r.done&&!r.timedOut;}),s=0;dr.forEach(function(r){s+=r.ai[c.key]||0;});return dr.length?(s/dr.length).toFixed(1):'N/A';}).join(',')+','+(d.aiAvgSum?d.aiAvgSum.toFixed(1):'N/A')+',,'+(d.humanSum||'N/A')+','+(d.finalScore||'N/A')+'\n';}});
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='ScheduleBench_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(url);
}
